packages:
  - "apps/*"
  - "packages/*"
  - "services/*"

# Centralized dependency cataloging to avoid version drift across workspaces
catalog:
  typescript: "^5.5.3"
  ts-node: "^10.9.2"
  ethers: "^6.13.1"
  zod: "^3.23.8"

packageConfigs:
  - match: ["apps/*", "services/*"]
    saveExact: true
