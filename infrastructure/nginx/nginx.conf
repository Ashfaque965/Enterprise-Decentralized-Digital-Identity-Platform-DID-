user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 10240;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format json_combined escape=json
      '{"time_local":"$time_local",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status": "$status",'
      '"body_bytes_sent":"$body_bytes_sent",'
      '"request_time":"$request_time",'
      '"http_referrer":"$http_referer",'
      '"http_user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/access_json.log json_combined;

    # Performance tuning configurations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Global security profiles (OWASP Top 10 hardening rulesets)
    server_tokens off;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Rate Limiting configuration zones
    limit_req_zone $binary_remote_addr zone=identity_api_limit:20m rate=100r/s;

    # Upstream application cluster target pools
    upstream issuer_service {
        server credential-issuer-service.nexuscore-identity.svc.cluster.local:8081 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream verifier_service {
        server credential-verifier-service.nexuscore-identity.svc.cluster.local:8082 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    server {
        listen 443 ssl http2 default_server;
        server_name api.identity.nexuscore.io;

        # TLS 1.3 Enterprise Ciphers configuration setup
        ssl_certificate /etc/ssl/certs/nexuscore_live_chain.crt;
        ssl_certificate_key /etc/ssl/private/nexuscore_live_private.key;
        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 5M;

        # Edge Routing definitions
        location /api/v1/credentials/ {
            limit_req zone=identity_api_limit burst=50 nodelay;
            proxy_pass http://issuer_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/v1/verifications/ {
            limit_req zone=identity_api_limit burst=100 nodelay;
            proxy_pass http://verifier_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Fallback security handling
        location / {
            return 404 json_encode '{"error": "API Route target resource context route not found"}';
        }
    }
}