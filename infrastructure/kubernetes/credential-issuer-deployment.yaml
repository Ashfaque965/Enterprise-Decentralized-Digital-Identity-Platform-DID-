apiVersion: apps/v1
kind: Deployment
metadata:
  name: credential-issuer-deployment
  namespace: nexuscore-identity
  labels:
    app.kubernetes.io/name: credential-issuer
    app.kubernetes.io/part-of: nexuscore-core-backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: credential-issuer
  template:
    metadata:
      labels:
        app: credential-issuer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: core-issuer-node
          image: nexuscore-registry.internal/identity/credential-issuer:v1.2.4
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8081
              name: http-api
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: identity-db-credentials
                  key: connection_string
            - name: KAFKA_BROKER
              value: "kafka-cluster-kafka-bootstrap.nexuscore-infra.svc.cluster.local:9092"
          resources:
            limits:
              cpu: "1000m"
              memory: "1024Mi"
            requests:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http-api
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http-api
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: credential-issuer-service
  namespace: nexuscore-identity
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: http-api
      protocol: TCP
      name: http
  selector:
    app: credential-issuer